\* SGDirect配置文件
\* 直接使用桌面上的StateGraphs模块（D:\Desktop\StateGraphs.tla）
\* 通过NumNodes参数选择不同的图：
\*   1  -> G1  (4个节点)
\*   2  -> G1a (4个节点)
\*   4  -> G3  (4个节点)
\*   5  -> G2  (5个节点)
\*   9  -> G4  (9个节点)
\*   50 -> G7  (50个节点，默认)
\*   101-> GDH (101个节点)

CONSTANTS
    NumNodes = 50

SPECIFICATION Spec
CHECK_DEADLOCK FALSE
